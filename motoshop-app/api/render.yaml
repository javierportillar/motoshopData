services:
  - type: web
    name: motoshop-cloud-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -e .
    startCommand: uvicorn motoshop_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_HTTP_PATH
        value: /sql/1.0/warehouses/43bc044eaef4cca4
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://app.fragloesja.uk,https://motoshop-web-tau.vercel.app
      - key: ENV
        value: prod
      - key: USERS_FILE_PATH
        value: users.yaml
      - key: DATA_BACKEND
        value: duckdb
      # DUCKDB_PATH removido (2026-06-15): el override fijo a motoshop_gold.duckdb
      # rompia el multi-tenant — con la env var seteada, _make_db_path() ignoraba
      # el tenant y siempre devolvia el path de MotoShop, asi masvital terminaba
      # leyendo el DuckDB equivocado. Sin esta var y con ENV=prod, el codigo usa
      # el default /tmp/{tenant}_gold.duckdb que es lo correcto post-M1.7.
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: motoshop-gold
      - key: R2_ENDPOINT
        value: https://4bd1502b7fa3f33d1d3c45ae2d252cfd.r2.cloudflarestorage.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID_MOTOSHOP
        sync: false
      - key: TELEGRAM_CHAT_ID_MASVITAL
        sync: false
