name: Vercel Production Deploy

# Auto-deploy PWA a Vercel cuando hay push a main.
# Reemplaza el auto-deploy nativo (que dejó de funcionar al
# desinstalarse la Vercel GitHub App).

on:
  push:
    branches: [main]
    paths:
      - "motoshop-app/web/**"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel production
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_API_TOKEN }} \
            --cwd=motoshop-app/web \
            --debug \
            --yes 2>&1
