name: Briefing diario multiempresa
on:
  schedule:
    - cron: "0 11 * * *"   # 06:00 COL = 11:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-briefing:
    name: Enviar briefing · ${{ matrix.tenant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant:
          - motoshop
          - masvital
    steps:
      - name: Enviar briefing aislado con token de máquina
        env:
          BRIEFING_REFRESH_TOKEN: ${{ secrets.BRIEFING_REFRESH_TOKEN }}
          TENANT: ${{ matrix.tenant }}
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          if [ -z "${BRIEFING_REFRESH_TOKEN:-}" ]; then
            echo "::error title=Briefing $TENANT::tenant=$TENANT http=000 category=missing_machine_token"
            exit 1
          fi

          set +e
          SEND_STATUS=$(curl -sS -o "$TMP_DIR/send.body" -w "%{http_code}" \
            -X POST https://api.fragloesja.uk/api/llm/briefing/send \
            -H "Authorization: Bearer $BRIEFING_REFRESH_TOKEN" \
            -H "X-Tenant: $TENANT")
          SEND_EXIT=$?
          set -e
          if [ "$SEND_EXIT" -ne 0 ]; then
            echo "::error title=Briefing $TENANT::tenant=$TENANT http=000 category=network_error"
            exit 1
          fi
          if [ "$SEND_STATUS" != "200" ]; then
            CATEGORY="json_response"
            jq -e . "$TMP_DIR/send.body" >/dev/null 2>&1 || CATEGORY="non_json_response"
            echo "::error title=Briefing $TENANT::tenant=$TENANT http=$SEND_STATUS category=$CATEGORY"
            exit 1
          fi
          if ! jq -e '.status == "sent"' "$TMP_DIR/send.body" >/dev/null 2>&1; then
            echo "::error title=Briefing $TENANT::tenant=$TENANT http=200 category=invalid_success_response"
            exit 1
          fi
          echo "Briefing enviado correctamente para $TENANT"
