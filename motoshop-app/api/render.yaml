services:
  - type: web
    name: motoshop-cloud-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -e .
    startCommand: uvicorn motoshop_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_HTTP_PATH
        value: /sql/1.0/warehouses/43bc044eaef4cca4
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://app.fragloesja.uk,https://motoshop-web-tau.vercel.app
      - key: ENV
        value: dev
      - key: USERS_FILE_PATH
        value: users.yaml
      - key: DATA_BACKEND
        value: duckdb
      - key: DUCKDB_PATH
        value: /tmp/motoshop_gold.duckdb
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: motoshop-gold
      - key: R2_ENDPOINT
        value: https://4bd1502b7fa3f33d1d3c45ae2d252cfd.r2.cloudflarestorage.com
