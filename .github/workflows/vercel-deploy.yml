name: Vercel Production Deploy (DEPRECATED)

# DEPRECADO 2026-06-14. El frontend se movió al repo `frontfambus`
# (https://github.com/javierportillar/frontfambus) y Vercel auto-deploya
# desde ahí por integración nativa con GitHub.
#
# Auto-trigger desactivado: solo workflow_dispatch manual (por si hay que
# disparar un deploy puntual del legacy mientras el directorio
# motoshop-app/web/ todavía existe como respaldo).
#
# Borrar este archivo + el directorio motoshop-app/web/ cuando se valide
# que el primer deploy desde `frontfambus` funcionó.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel production
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_API_TOKEN }} \
            --cwd=motoshop-app/web \
            --debug \
            --yes 2>&1
