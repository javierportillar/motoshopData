name: MotoShop briefing diario
on:
  schedule:
    - cron: "0 11 * * *"   # 06:00 COL = 11:00 UTC
  workflow_dispatch:        # disparo manual desde GitHub UI

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Login admin
        id: auth
        run: |
          TOKEN=$(curl -sS -X POST https://api.fragloesja.uk/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"${{ secrets.ADMIN_PASSWORD }}"}' \
            | jq -r .access_token)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Login failed"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Generate and send briefing
        run: |
          RESPONSE=$(curl -sS -X POST https://api.fragloesja.uk/api/llm/briefing/send \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -w "\nHTTP:%{http_code}")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP:")
          echo "HTTP status: $HTTP_CODE"
          echo "$BODY" | jq .
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Briefing send failed"
            exit 1
          fi
          echo "Briefing sent successfully"
